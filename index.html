<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="card">
        <h1>Todo List</h1>
        <p class="subtitle">Stay focused and keep track of your day.</p>

        <form id="todo-form" class="todo-form">
          <input id="todo-input" type="text" placeholder="What needs to be done?" maxlength="80" required />
          <button type="submit">Add</button>
        </form>

        <ul id="todo-list" class="todo-list"></ul>

        <div class="footer">
          <span id="task-count">0 tasks</span>
          <button id="clear-completed" class="ghost-btn">Clear completed</button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
